<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>sourcing.directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090D;
  --s1: #111118;
  --s2: #18181F;
  --s3: #1F1F28;
  --bd: rgba(255,255,255,0.07);
  --bd2: rgba(255,255,255,0.12);
  --tx: #EEEEF2;
  --tx2: rgba(238,238,242,0.55);
  --tx3: rgba(238,238,242,0.28);
  --cyan: #22D3EE;
  --cyan-dim: rgba(34,211,238,0.1);
  --cyan-brd: rgba(34,211,238,0.25);
  --violet: #A78BFA;
  --violet-dim: rgba(167,139,250,0.1);
  --violet-brd: rgba(167,139,250,0.25);
  --emerald: #34D399;
  --amber: #FBBF24;
  --rose: #FB7185;
  --r: 14px;
  --r-sm: 8px;
  --r-xs: 5px;
  --nav-h: 72px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--tx); font-family:'Inter', system-ui, sans-serif; }
.app { height:100dvh; display:flex; flex-direction:column; position:relative; overflow:hidden; }

/* ═══ SCREENS ═══ */
.screen { position:absolute; inset:0; bottom:var(--nav-h); display:flex; flex-direction:column; overflow:hidden; opacity:0; pointer-events:none; transition:opacity 0.2s ease, transform 0.25s cubic-bezier(0.16,1,0.3,1); transform:translateY(6px); }
.screen.active { opacity:1; pointer-events:all; transform:translateY(0); }

/* ═══ BOTTOM NAV ═══ */
.nav {
  position:absolute; bottom:0; left:0; right:0; height:var(--nav-h);
  background:rgba(9,9,13,0.92); backdrop-filter:blur(20px);
  border-top:1px solid var(--bd);
  display:flex; align-items:center; justify-content:space-around;
  padding:0 8px; padding-bottom:max(env(safe-area-inset-bottom), 8px);
  z-index:100;
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:8px 0; cursor:pointer; border:none; background:none;
  transition:all 0.15s;
}
.nav-btn:active { transform:scale(0.92); }
.nav-icon { width:26px; height:26px; display:flex; align-items:center; justify-content:center; border-radius:7px; transition:all 0.15s; color:var(--tx3); }
.nav-icon svg { transition:all 0.15s; }
.nav-label { font-size:10px; font-weight:600; letter-spacing:0.02em; color:var(--tx3); transition:color 0.15s; }
.nav-btn.on .nav-icon { background:var(--cyan-dim); color:var(--cyan); }
.nav-btn.on .nav-label { color:var(--cyan); }

/* ═══ SCROLL CONTAINER ═══ */
.scroll { flex:1; overflow-y:auto; overscroll-behavior:contain; scrollbar-width:none; }
.scroll::-webkit-scrollbar { display:none; }

/* ═══ PAGE HEADER ═══ */
.page-hdr {
  padding:max(env(safe-area-inset-top),52px) 20px 0;
  background:var(--bg);
  position:sticky; top:0; z-index:10;
}
.page-hdr-inner { padding-bottom:16px; }
.wordmark { font-size:13px; font-weight:700; color:var(--tx3); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:4px; }
.page-title { font-size:26px; font-weight:800; letter-spacing:-0.03em; color:var(--tx); line-height:1.1; }
.page-sub { font-size:13px; color:var(--tx2); margin-top:4px; line-height:1.4; }

/* ═══ SEARCH BAR ═══ */
.search-wrap {
  display:flex; align-items:center; gap:10px;
  background:var(--s2); border:1px solid var(--bd);
  border-radius:var(--r); padding:11px 14px;
  margin:0 20px 4px; transition:border-color 0.15s;
}
.search-wrap:focus-within { border-color:var(--cyan-brd); }
.search-wrap svg { color:var(--tx3); flex-shrink:0; }
.search-wrap input {
  flex:1; background:none; border:none; outline:none;
  font-size:14px; font-family:inherit; color:var(--tx);
}
.search-wrap input::placeholder { color:var(--tx3); }

/* ═══ FILTER CHIPS ═══ */
.chips {
  display:flex; gap:8px; padding:12px 20px;
  overflow-x:auto; scrollbar-width:none;
}
.chips::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink:0; padding:6px 14px; border-radius:100px;
  font-size:12px; font-weight:600; cursor:pointer;
  border:1px solid var(--bd); background:var(--s1); color:var(--tx2);
  transition:all 0.15s; white-space:nowrap;
}
.chip:active { transform:scale(0.95); }
.chip.on { border-color:var(--cyan-brd); background:var(--cyan-dim); color:var(--cyan); }

/* ═══ SECTION HEADER ═══ */
.sec-hdr { display:flex; align-items:center; justify-content:space-between; padding:20px 20px 12px; }
.sec-title { font-size:13px; font-weight:700; color:var(--tx3); text-transform:uppercase; letter-spacing:0.07em; }
.sec-count { font-size:12px; font-weight:600; color:var(--tx3); }

/* ═══ CHOOSER SCREEN ═══ */
.chooser-hero {
  padding:max(env(safe-area-inset-top),52px) 20px 24px;
  display:flex; flex-direction:column;
}
.chooser-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--s2); border:1px solid var(--bd);
  border-radius:100px; padding:5px 12px 5px 8px;
  font-size:11px; font-weight:600; color:var(--tx2);
  width:fit-content; margin-bottom:20px;
}
.chooser-badge-dot { width:6px; height:6px; border-radius:50%; background:var(--emerald); box-shadow:0 0 8px var(--emerald); }
.chooser-title { font-size:30px; font-weight:900; letter-spacing:-0.04em; line-height:1.05; color:var(--tx); margin-bottom:8px; }
.chooser-title em { color:var(--cyan); font-style:normal; }
.chooser-sub { font-size:14px; color:var(--tx2); line-height:1.5; }

.dir-cards { display:flex; flex-direction:column; gap:12px; padding:0 20px; }
.dir-card {
  border-radius:var(--r); overflow:hidden; cursor:pointer;
  transition:transform 0.2s; position:relative;
  border:1px solid var(--bd);
}
.dir-card:active { transform:scale(0.98); }
.dir-card-body { padding:20px; position:relative; z-index:1; }
.dir-card-tag {
  font-size:10px; font-weight:800; letter-spacing:0.1em; text-transform:uppercase;
  margin-bottom:8px;
}
.dir-card-name { font-size:22px; font-weight:900; letter-spacing:-0.03em; margin-bottom:4px; }
.dir-card-desc { font-size:12px; line-height:1.4; }
.dir-card-foot {
  display:flex; align-items:center; justify-content:space-between;
  margin-top:16px;
}
.dir-card-count { display:flex; align-items:center; gap:6px; }
.dir-card-count-num { font-size:24px; font-weight:900; letter-spacing:-0.04em; }
.dir-card-count-label { font-size:11px; font-weight:500; opacity:0.7; margin-top:2px; }
.dir-card-arrow {
  width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,0.08);
}

.dir-card.space { background:linear-gradient(135deg, #0D0A20 0%, #17113A 100%); }
.dir-card.space .dir-card-tag { color:var(--violet); }
.dir-card.space .dir-card-name { color:#E2D9FF; }
.dir-card.space .dir-card-desc { color:rgba(226,217,255,0.55); }
.dir-card.space .dir-card-count-num { color:#C4B5FD; }

.dir-card.semi { background:linear-gradient(135deg, #071825 0%, #0A2435 100%); }
.dir-card.semi .dir-card-tag { color:var(--cyan); }
.dir-card.semi .dir-card-name { color:#CEF1FF; }
.dir-card.semi .dir-card-desc { color:rgba(206,241,255,0.55); }
.dir-card.semi .dir-card-count-num { color:var(--cyan); }

.dir-card.all { background:var(--s2); }
.dir-card.all .dir-card-tag { color:var(--tx3); }
.dir-card.all .dir-card-name { color:var(--tx); }
.dir-card.all .dir-card-desc { color:var(--tx2); }
.dir-card.all .dir-card-count-num { color:var(--tx); }

/* ═══ COMPANY LIST ═══ */
.company-list { display:flex; flex-direction:column; gap:1px; padding:0 20px 20px; }
.co-card {
  display:flex; align-items:center; gap:14px;
  padding:14px 0; border-bottom:1px solid var(--bd);
  cursor:pointer; transition:background 0.1s;
}
.co-card:last-child { border-bottom:none; }
.co-card:active { background:rgba(255,255,255,0.02); border-radius:var(--r-sm); }
.co-logo {
  width:44px; height:44px; border-radius:var(--r-sm); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:900; font-family:inherit;
}
.co-body { flex:1; min-width:0; }
.co-name { font-size:14px; font-weight:700; color:var(--tx); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.co-loc { font-size:12px; color:var(--tx2); margin-top:2px; }
.co-badges { display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; }
.co-badge {
  font-size:9px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase;
  padding:2px 6px; border-radius:3px; white-space:nowrap;
}
.co-badge.feat { background:rgba(251,191,36,0.15); border:1px solid rgba(251,191,36,0.3); color:var(--amber); }
.co-badge.cert { background:var(--s3); border:1px solid var(--bd2); color:var(--tx2); }
.co-arrow { color:var(--tx3); flex-shrink:0; }

.empty-state {
  text-align:center; padding:60px 20px;
  display:flex; flex-direction:column; align-items:center; gap:12px;
}
.empty-icon { width:48px; height:48px; border-radius:50%; background:var(--s2); border:1px solid var(--bd); display:flex; align-items:center; justify-content:center; color:var(--tx3); }
.empty-title { font-size:15px; font-weight:700; color:var(--tx); }
.empty-sub { font-size:13px; color:var(--tx2); }

/* ═══ SKELETON LOADING ═══ */
.skel { background:linear-gradient(90deg, var(--s2) 25%, var(--s3) 50%, var(--s2) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:var(--r-xs); }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ═══ EVENT LIST ═══ */
.event-list { display:flex; flex-direction:column; gap:12px; padding:0 20px 24px; }
.ev-card {
  background:var(--s1); border:1px solid var(--bd);
  border-radius:var(--r); padding:16px;
  cursor:pointer; transition:border-color 0.15s, transform 0.15s;
  display:flex; gap:14px; align-items:flex-start;
}
.ev-card:active { transform:scale(0.98); border-color:var(--bd2); }

.ev-date-pill {
  width:48px; flex-shrink:0;
  background:var(--s2); border:1px solid var(--bd2);
  border-radius:var(--r-sm); padding:8px 0; text-align:center;
}
.ev-date-pill.upcoming { background:var(--cyan-dim); border-color:var(--cyan-brd); }
.ev-date-month { font-size:9px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; color:var(--tx3); }
.ev-date-pill.upcoming .ev-date-month { color:var(--cyan); }
.ev-date-day { font-size:22px; font-weight:900; letter-spacing:-0.03em; color:var(--tx2); line-height:1; margin-top:2px; }
.ev-date-pill.upcoming .ev-date-day { color:var(--cyan); }

.ev-body { flex:1; min-width:0; }
.ev-meta { display:flex; align-items:center; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
.ev-type {
  font-size:9px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase;
  padding:2px 7px; border-radius:3px;
}
.ev-type.conference { background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.3); color:#34D399; }
.ev-type.meetup { background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.3); color:#86EFAC; }
.ev-type.webinar { background:rgba(59,130,246,0.12); border:1px solid rgba(59,130,246,0.3); color:#93C5FD; }
.ev-type.workshop { background:rgba(139,92,246,0.12); border:1px solid rgba(139,92,246,0.3); color:#C4B5FD; }
.ev-type.expo { background:rgba(234,179,8,0.12); border:1px solid rgba(234,179,8,0.3); color:#FDE68A; }
.ev-type.default { background:var(--s3); border:1px solid var(--bd2); color:var(--tx2); }

.ev-vertical { font-size:9px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; padding:2px 7px; border-radius:3px; }
.ev-vertical.space { background:var(--violet-dim); border:1px solid var(--violet-brd); color:var(--violet); }
.ev-vertical.semiconductor { background:var(--cyan-dim); border:1px solid var(--cyan-brd); color:var(--cyan); }

.ev-title { font-size:14px; font-weight:700; color:var(--tx); line-height:1.3; margin-bottom:4px; }
.ev-organizer { font-size:12px; color:var(--tx2); }
.ev-location { font-size:11px; color:var(--tx3); margin-top:4px; display:flex; align-items:center; gap:4px; }
.ev-virtual { display:inline-flex; align-items:center; gap:3px; font-size:10px; font-weight:700; color:var(--cyan); background:var(--cyan-dim); border:1px solid var(--cyan-brd); border-radius:3px; padding:1px 5px; margin-top:4px; }

/* ═══ TOGGLE ═══ */
.toggle-row { display:flex; align-items:center; justify-content:space-between; padding:12px 20px 4px; }
.toggle-label { font-size:12px; font-weight:600; color:var(--tx2); }
.toggle {
  width:38px; height:22px; border-radius:100px;
  background:var(--s3); border:1px solid var(--bd2);
  position:relative; cursor:pointer; transition:background 0.2s;
}
.toggle.on { background:var(--cyan); border-color:var(--cyan); }
.toggle-dot {
  width:16px; height:16px; border-radius:50%;
  background:#fff; position:absolute; top:2px; left:2px;
  transition:transform 0.2s cubic-bezier(0.16,1,0.3,1);
}
.toggle.on .toggle-dot { transform:translateX(16px); }

/* ═══ BROWSE HEADER (sticky) ═══ */
.browse-hdr {
  background:var(--bg); position:sticky; top:0; z-index:10;
  padding-top:max(env(safe-area-inset-top), 12px);
}
.browse-hdr-inner { padding:12px 20px 0; }
.browse-title { font-size:22px; font-weight:900; letter-spacing:-0.03em; color:var(--tx); margin-bottom:12px; }

/* ═══ EVENTS HEADER ═══ */
.events-hdr {
  background:var(--bg); position:sticky; top:0; z-index:10;
  padding-top:max(env(safe-area-inset-top), 12px);
}
.events-hdr-inner { padding:12px 20px 0; }
.events-title { font-size:22px; font-weight:900; letter-spacing:-0.03em; color:var(--tx); margin-bottom:0; }

/* Loading skeletons */
.skel-co { display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid var(--bd); }
.skel-avatar { width:44px; height:44px; border-radius:var(--r-sm); flex-shrink:0; }
.skel-body { flex:1; display:flex; flex-direction:column; gap:6px; }

/* ═══ SPINNER ═══ */
@keyframes spin { to { transform:rotate(360deg); } }
.spinner { width:20px; height:20px; border-radius:50%; border:2px solid var(--s3); border-top-color:var(--cyan); animation:spin 0.7s linear infinite; }
</style>
</head>
<body>
<div class="app">

  <!-- ═══ SCREEN: CHOOSER ═══ -->
  <div class="screen active" id="s-home">
    <div class="scroll">
      <div class="chooser-hero">
        <div class="chooser-badge">
          <div class="chooser-badge-dot"></div>
          Arizona Advanced Industries
        </div>
        <div class="chooser-title">Find your <em>supply chain</em> partner</div>
        <div class="chooser-sub">Verified suppliers, certified companies, and industry events — all in one place.</div>
      </div>

      <div class="sec-hdr" style="padding-top:0">
        <div class="sec-title">Directories</div>
        <div class="sec-count" id="tenant-count"></div>
      </div>

      <div class="dir-cards" id="dir-cards">
        <!-- Skeleton -->
        <div class="dir-card space" style="height:140px; position:relative; overflow:hidden;">
          <div style="position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.03),transparent);background-size:200% 100%;animation:shimmer 1.5s infinite;"></div>
        </div>
        <div class="dir-card semi" style="height:140px; position:relative; overflow:hidden;">
          <div style="position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.03),transparent);background-size:200% 100%;animation:shimmer 1.5s infinite;"></div>
        </div>
      </div>

      <div style="padding:20px 20px 8px;">
        <button onclick="goToBrowse('all')" style="width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:14px;font-size:14px;font-weight:600;color:var(--tx2);font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:border-color 0.15s;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Browse all companies
        </button>
      </div>
    </div>
  </div>

  <!-- ═══ SCREEN: BROWSE ═══ -->
  <div class="screen" id="s-browse">
    <div class="browse-hdr">
      <div class="browse-hdr-inner">
        <div class="browse-title">Browse</div>
      </div>
      <div class="search-wrap">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="co-search" type="text" placeholder="Search companies..." oninput="filterCompanies()" autocomplete="off" spellcheck="false">
      </div>
      <div class="chips" id="co-chips">
        <button class="chip on" onclick="setVertical('all', this)">All</button>
        <button class="chip" onclick="setVertical('semiconductor', this)">Semiconductor</button>
        <button class="chip" onclick="setVertical('space', this)">Space &amp; Aerospace</button>
      </div>
    </div>
    <div class="scroll">
      <div class="sec-hdr">
        <div class="sec-title">Companies</div>
        <div class="sec-count" id="co-count"></div>
      </div>
      <div class="company-list" id="co-list">
        <!-- Skeletons -->
        <div class="skel-co"><div class="skel skel-avatar"></div><div class="skel-body"><div class="skel" style="height:14px;width:70%;"></div><div class="skel" style="height:11px;width:45%;"></div></div></div>
        <div class="skel-co"><div class="skel skel-avatar"></div><div class="skel-body"><div class="skel" style="height:14px;width:60%;"></div><div class="skel" style="height:11px;width:40%;"></div></div></div>
        <div class="skel-co"><div class="skel skel-avatar"></div><div class="skel-body"><div class="skel" style="height:14px;width:80%;"></div><div class="skel" style="height:11px;width:50%;"></div></div></div>
        <div class="skel-co"><div class="skel skel-avatar"></div><div class="skel-body"><div class="skel" style="height:14px;width:55%;"></div><div class="skel" style="height:11px;width:35%;"></div></div></div>
        <div class="skel-co"><div class="skel skel-avatar"></div><div class="skel-body"><div class="skel" style="height:14px;width:65%;"></div><div class="skel" style="height:11px;width:42%;"></div></div></div>
      </div>
    </div>
  </div>

  <!-- ═══ SCREEN: EVENTS ═══ -->
  <div class="screen" id="s-events">
    <div class="events-hdr">
      <div class="events-hdr-inner">
        <div class="events-title">Events</div>
      </div>
      <div class="search-wrap" style="margin-top:12px;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="ev-search" type="text" placeholder="Search events..." oninput="renderEvents()" autocomplete="off" spellcheck="false">
      </div>
      <div class="chips" id="ev-chips">
        <button class="chip on" onclick="setEvVertical('all', this)">All Industries</button>
        <button class="chip" onclick="setEvVertical('semiconductor', this)">Semiconductor</button>
        <button class="chip" onclick="setEvVertical('space', this)">Space</button>
      </div>
      <div class="chips" id="ev-type-chips" style="padding-top:0;margin-top:-4px;">
        <button class="chip on" onclick="setEvType('all', this)">All Types</button>
        <button class="chip" onclick="setEvType('conference', this)">Conference</button>
        <button class="chip" onclick="setEvType('meetup', this)">Meetup</button>
        <button class="chip" onclick="setEvType('webinar', this)">Webinar</button>
        <button class="chip" onclick="setEvType('workshop', this)">Workshop</button>
        <button class="chip" onclick="setEvType('expo', this)">Expo</button>
      </div>
      <div class="toggle-row">
        <div class="toggle-label">Upcoming only</div>
        <div class="toggle on" id="ev-toggle" onclick="toggleUpcoming()"><div class="toggle-dot"></div></div>
      </div>
    </div>
    <div class="scroll">
      <div class="sec-hdr" style="padding-top:12px;">
        <div class="sec-title">Events</div>
        <div class="sec-count" id="ev-count"></div>
      </div>
      <div class="event-list" id="ev-list">
        <!-- Skeletons -->
        <div class="ev-card"><div style="width:48px;height:70px;" class="skel"></div><div style="flex:1;display:flex;flex-direction:column;gap:8px;"><div class="skel" style="height:10px;width:40%;"></div><div class="skel" style="height:14px;width:80%;"></div><div class="skel" style="height:11px;width:55%;"></div></div></div>
        <div class="ev-card"><div style="width:48px;height:70px;" class="skel"></div><div style="flex:1;display:flex;flex-direction:column;gap:8px;"><div class="skel" style="height:10px;width:35%;"></div><div class="skel" style="height:14px;width:75%;"></div><div class="skel" style="height:11px;width:60%;"></div></div></div>
        <div class="ev-card"><div style="width:48px;height:70px;" class="skel"></div><div style="flex:1;display:flex;flex-direction:column;gap:8px;"><div class="skel" style="height:10px;width:45%;"></div><div class="skel" style="height:14px;width:70%;"></div><div class="skel" style="height:11px;width:50%;"></div></div></div>
      </div>
    </div>
  </div>

  <!-- ═══ BOTTOM NAV ═══ -->
  <nav class="nav">
    <button class="nav-btn on" id="nb-home" onclick="switchTab('home')">
      <div class="nav-icon">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      </div>
      <div class="nav-label">Home</div>
    </button>
    <button class="nav-btn" id="nb-browse" onclick="switchTab('browse')">
      <div class="nav-icon">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </div>
      <div class="nav-label">Directory</div>
    </button>
    <button class="nav-btn" id="nb-events" onclick="switchTab('events')">
      <div class="nav-icon">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div class="nav-label">Events</div>
    </button>
  </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ─── Supabase Init ────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://mcngatprgluexjjcqpkp.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_fXZg2ZQNzLWSdSEpfRezbw_mMTfqI1e';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── State ────────────────────────────────────────────────────────────────────
let allCompanies = [];
let allCerts = {};
let allEvents = [];
let currentVertical = 'all';
let currentEvType = 'all';
let currentEvVertical = 'all';
let upcomingOnly = true;
let activeTab = 'home';
let pendingBrowseVertical = null;

// ─── Color helpers ────────────────────────────────────────────────────────────
const LOGO_PALETTES = [
  { bg:'#0D1428', fg:'#60A5FA' },
  { bg:'#1E1145', fg:'#A78BFA' },
  { bg:'#0d2818', fg:'#34D399' },
  { bg:'#2D0A0A', fg:'#FB7185' },
  { bg:'#062028', fg:'#38BDF8' },
  { bg:'#2D1B06', fg:'#FBBF24' },
  { bg:'#1a0d28', fg:'#C084FC' },
  { bg:'#2D1506', fg:'#FB923C' },
];
function logoPalette(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
  return LOGO_PALETTES[h % LOGO_PALETTES.length];
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function switchTab(tab) {
  ['home','browse','events'].forEach(t => {
    document.getElementById('s-' + t).classList.toggle('active', t === tab);
    document.getElementById('nb-' + t).classList.toggle('on', t === tab);
  });
  activeTab = tab;

  if (tab === 'browse' && pendingBrowseVertical !== null) {
    applyBrowseVertical(pendingBrowseVertical);
    pendingBrowseVertical = null;
  }
}

function goToBrowse(vertical) {
  pendingBrowseVertical = vertical;
  switchTab('browse');
}

function applyBrowseVertical(vertical) {
  currentVertical = vertical;
  document.querySelectorAll('#co-chips .chip').forEach(c => {
    const cv = c.getAttribute('data-v') || c.textContent.trim().toLowerCase().replace(/ &amp; /, ' & ').replace(/[^a-z ]/g,'').trim();
    const matches = vertical === 'all' ? cv === 'all' : cv.includes(vertical);
    c.classList.toggle('on', matches);
    c.classList.toggle('off', !matches);
  });
  renderCompanies();
}

// ─── Vertical filter ──────────────────────────────────────────────────────────
function setVertical(v, btn) {
  currentVertical = v;
  document.querySelectorAll('#co-chips .chip').forEach(c => { c.classList.remove('on'); });
  btn.classList.add('on');
  renderCompanies();
}

// ─── Event vertical filter ────────────────────────────────────────────────────
function setEvVertical(v, btn) {
  currentEvVertical = v;
  document.querySelectorAll('#ev-chips .chip').forEach(c => { c.classList.remove('on'); });
  btn.classList.add('on');
  renderEvents();
}

// ─── Event type filter ────────────────────────────────────────────────────────
function setEvType(et, btn) {
  currentEvType = et;
  document.querySelectorAll('#ev-type-chips .chip').forEach(c => { c.classList.remove('on'); });
  btn.classList.add('on');
  renderEvents();
}

// ─── Upcoming toggle ──────────────────────────────────────────────────────────
function toggleUpcoming() {
  upcomingOnly = !upcomingOnly;
  document.getElementById('ev-toggle').classList.toggle('on', upcomingOnly);
  renderEvents();
}

// ─── Company search ───────────────────────────────────────────────────────────
function filterCompanies() { renderCompanies(); }

// ─── Render Companies ─────────────────────────────────────────────────────────
function renderCompanies() {
  const q = document.getElementById('co-search').value.toLowerCase().trim();
  let filtered = allCompanies;

  if (currentVertical !== 'all') {
    filtered = filtered.filter(c => c.vertical === currentVertical);
  }
  if (q) {
    filtered = filtered.filter(c =>
      c.name.toLowerCase().includes(q) ||
      (c.description || '').toLowerCase().includes(q) ||
      (c.location || '').toLowerCase().includes(q)
    );
  }

  document.getElementById('co-count').textContent = filtered.length + ' companies';

  if (filtered.length === 0) {
    document.getElementById('co-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
        <div class="empty-title">No companies found</div>
        <div class="empty-sub">Try a different search or filter</div>
      </div>`;
    return;
  }

  document.getElementById('co-list').innerHTML = filtered.map(c => {
    const pal = logoPalette(c.name);
    const certs = (allCerts[c.id] || []).slice(0, 2);
    return `
      <div class="co-card">
        <div class="co-logo" style="background:${pal.bg};color:${pal.fg}">${c.name.charAt(0).toUpperCase()}</div>
        <div class="co-body">
          <div class="co-name">${escHtml(c.name)}</div>
          <div class="co-loc">${escHtml(c.location || c.city || '')}</div>
          <div class="co-badges">
            ${c.featured ? '<span class="co-badge feat">Featured</span>' : ''}
            ${certs.map(cert => `<span class="co-badge cert">${escHtml(cert.name)}</span>`).join('')}
          </div>
        </div>
        <div class="co-arrow"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>
      </div>`;
  }).join('');
}

// ─── Render Events ────────────────────────────────────────────────────────────
function renderEvents() {
  const now = new Date();
  const q = (document.getElementById('ev-search')?.value || '').toLowerCase().trim();
  let filtered = allEvents;

  if (upcomingOnly) {
    filtered = filtered.filter(e => !e.event_date || new Date(e.event_date) >= now);
  }
  if (currentEvVertical !== 'all') {
    filtered = filtered.filter(e => e.vertical === currentEvVertical);
  }
  if (currentEvType !== 'all') {
    filtered = filtered.filter(e => e.event_type === currentEvType);
  }
  if (q) {
    filtered = filtered.filter(e =>
      (e.title || '').toLowerCase().includes(q) ||
      (e.organizer || '').toLowerCase().includes(q) ||
      (e.event_location || '').toLowerCase().includes(q) ||
      (e.description || '').toLowerCase().includes(q)
    );
  }

  document.getElementById('ev-count').textContent = filtered.length + ' event' + (filtered.length !== 1 ? 's' : '');

  if (filtered.length === 0) {
    document.getElementById('ev-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <div class="empty-title">No events found</div>
        <div class="empty-sub">${upcomingOnly ? 'Try turning off "Upcoming only"' : 'Check back soon'}</div>
      </div>`;
    return;
  }

  document.getElementById('ev-list').innerHTML = filtered.map(e => {
    const d = e.event_date ? new Date(e.event_date) : null;
    const isUpcoming = d && d >= now;
    const month = d ? d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase() : 'TBD';
    const day = d ? d.getDate() : '?';
    const etClass = e.event_type || 'default';
    const vertClass = e.vertical ? (e.vertical === 'space' ? 'space' : e.vertical === 'semiconductor' ? 'semiconductor' : '') : '';
    const vertLabel = e.vertical === 'space' ? 'Space & Aerospace' : e.vertical === 'semiconductor' ? 'Semiconductor' : '';
    return `
      <div class="ev-card">
        <div class="ev-date-pill${isUpcoming ? ' upcoming' : ''}">
          <div class="ev-date-month">${month}</div>
          <div class="ev-date-day">${day}</div>
        </div>
        <div class="ev-body">
          <div class="ev-meta">
            ${e.event_type ? `<span class="ev-type ${etClass}">${escHtml(e.event_type)}</span>` : ''}
            ${vertClass ? `<span class="ev-vertical ${vertClass}">${escHtml(vertLabel)}</span>` : ''}
          </div>
          <div class="ev-title">${escHtml(e.title)}</div>
          ${e.organizer ? `<div class="ev-organizer">${escHtml(e.organizer)}</div>` : ''}
          ${e.event_location ? `<div class="ev-location"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> ${escHtml(e.event_location)}</div>` : ''}
          ${e.virtual_url ? `<div class="ev-virtual"><svg width="8" height="8" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17,2 12,7 7,2"/></svg> Virtual</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

// ─── Render Chooser Cards ─────────────────────────────────────────────────────
function renderChooserCards(tenants) {
  const spaceT = tenants.find(t => t.slug === 'space-rising' || t.vertical === 'space' || (t.name && t.name.toLowerCase().includes('space')));
  const semiT = tenants.find(t => t.slug === 's3c' || t.vertical === 'semiconductor' || (t.name && t.name.toLowerCase().includes('semiconductor')));

  const totalCount = tenants.reduce((s, t) => s + (t.company_count || 0), 0);
  document.getElementById('tenant-count').textContent = tenants.length + ' director' + (tenants.length !== 1 ? 'ies' : 'y');

  const cards = tenants.map(t => {
    const isSpace = t.slug === 'space-rising' || (t.name && t.name.toLowerCase().includes('space'));
    const isSemi = t.slug === 's3c' || (t.name && t.name.toLowerCase().includes('semiconductor')) || (t.name && t.name.toLowerCase().includes('s3c'));
    const cls = isSpace ? 'space' : isSemi ? 'semi' : 'all';
    const tag = isSpace ? 'Space &amp; Aerospace' : isSemi ? 'Semiconductor' : 'Industry Directory';
    const desc = t.hero_text || t.description || 'Verified suppliers and certified companies';
    const count = t.company_count || 0;
    const vert = isSpace ? 'space' : isSemi ? 'semiconductor' : 'all';
    return `
      <div class="dir-card ${cls}" onclick="goToBrowse('${vert}')">
        <div class="dir-card-body">
          <div class="dir-card-tag">${tag}</div>
          <div class="dir-card-name">${escHtml(t.name)}</div>
          <div class="dir-card-desc">${escHtml(desc.substring(0, 80))}${desc.length > 80 ? '...' : ''}</div>
          <div class="dir-card-foot">
            <div class="dir-card-count">
              <div class="dir-card-count-num">${count}</div>
              <div class="dir-card-count-label">companies</div>
            </div>
            <div class="dir-card-arrow">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </div>
          </div>
        </div>
      </div>`;
  });

  document.getElementById('dir-cards').innerHTML = cards.join('');
}

// ─── Utility ──────────────────────────────────────────────────────────────────
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Data Fetching ────────────────────────────────────────────────────────────
async function fetchTenants() {
  try {
    // Try the API endpoint first (avoids exposing credentials)
    try {
      const res = await fetch('/api/sourcing/tenants');
      if (res.ok) {
        const data = await res.json();
        renderChooserCards(Array.isArray(data) ? data : []);
        return;
      }
    } catch { /* fallthrough */ }

    // Direct Supabase query
    const { data: tenants, error } = await sb
      .from('directory_tenants')
      .select('*')
      .eq('status', 'active')
      .order('name');

    if (error) throw error;

    // Enrich with company counts
    const enriched = await Promise.all((tenants || []).map(async t => {
      const { count } = await sb
        .from('directory_companies')
        .select('id', { count: 'exact', head: true })
        .eq('tenant_id', t.id);
      return { ...t, company_count: count || 0 };
    }));

    renderChooserCards(enriched);
  } catch (err) {
    console.error('Tenants fetch error:', err);
    // Fallback static cards
    renderChooserCards([
      { name:'Space Rising', slug:'space-rising', description:'Arizona space & aerospace suppliers', company_count:0 },
      { name:'S3C Arizona', slug:'s3c', description:'Arizona semiconductor supply chain', company_count:0 },
    ]);
  }
}

async function fetchCompanies() {
  try {
    const { data: companies, error } = await sb
      .from('directory_companies')
      .select('*')
      .eq('status', 'active')
      .order('featured', { ascending: false })
      .order('membership_tier', { ascending: true })
      .order('name', { ascending: true })
      .limit(200);

    if (error) throw error;
    allCompanies = companies || [];

    // Fetch certifications
    if (allCompanies.length > 0) {
      const ids = allCompanies.map(c => c.id);
      const { data: certsData } = await sb
        .from('directory_certifications')
        .select('company_id, name')
        .in('company_id', ids);

      allCerts = {};
      (certsData || []).forEach(cert => {
        if (!allCerts[cert.company_id]) allCerts[cert.company_id] = [];
        allCerts[cert.company_id].push(cert);
      });
    }

    renderCompanies();
  } catch (err) {
    console.error('Companies fetch error:', err);
    document.getElementById('co-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
        <div class="empty-title">Could not load companies</div>
        <div class="empty-sub">Check your connection and try again</div>
      </div>`;
  }
}

async function fetchEvents() {
  try {
    const { data: events, error } = await sb
      .from('directory_listings')
      .select('*')
      .eq('category', 'event')
      .eq('status', 'active')
      .order('event_date', { ascending: true })
      .limit(100);

    if (error) throw error;
    allEvents = events || [];

    renderEvents();
  } catch (err) {
    console.error('Events fetch error:', err);
    document.getElementById('ev-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
        <div class="empty-title">Could not load events</div>
        <div class="empty-sub">Check your connection and try again</div>
      </div>`;
  }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
fetchTenants();
fetchCompanies();
fetchEvents();
</script>
</body>
