<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>sourcing.directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0C0C0E;
  --surface: #18181B;
  --surface2: #1F1F23;
  --border: rgba(255,255,255,0.06);
  --text: #F4F4F5;
  --text2: rgba(244,244,245,0.55);
  --text3: rgba(244,244,245,0.3);
  --accent: #E87B35;
  --accent2: #7C6AED;
  --green: #34D399;
  --rose: #FB7185;
  --sky: #38BDF8;
  --amber: #FBBF24;
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }

.app { height:100dvh; position:relative; overflow:hidden; }

/* ═══ INTRO SCREEN ═══ */
.intro {
  position:absolute; inset:0; z-index:10;
  display:flex; flex-direction:column;
  background:var(--bg);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16,1,0.3,1);
}
.intro.out { opacity:0; transform:scale(0.95); pointer-events:none; }

.intro-hero {
  flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;
  padding:80px 32px 40px; text-align:center;
}
.intro-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:100px; padding:6px 14px 6px 8px;
  font-size:11px; font-weight:500; color:var(--text2);
  margin-bottom:32px;
}
.intro-badge-dot { width:6px; height:6px; border-radius:50%; background:var(--green); }
.intro-title {
  font-family:'DM Serif Display',serif;
  font-size:clamp(36px,10vw,48px);
  line-height:1.05; letter-spacing:-0.02em;
  color:var(--text);
  margin-bottom:16px;
}
.intro-title span { color:var(--accent); }
.intro-sub {
  font-size:16px; line-height:1.5; color:var(--text2);
  max-width:300px;
}

/* Community tiles - the visual hook */
.intro-tiles {
  display:grid; grid-template-columns:1fr 1fr; gap:12px;
  padding:0 24px 24px;
}
.intro-tile {
  border-radius:var(--radius); padding:20px 16px;
  cursor:pointer; position:relative; overflow:hidden;
  transition:transform 0.2s ease;
  min-height:140px; display:flex; flex-direction:column; justify-content:flex-end;
}
.intro-tile:active { transform:scale(0.97); }
.intro-tile-icon {
  font-size:32px; margin-bottom:12px;
}
.intro-tile-name {
  font-weight:700; font-size:17px; line-height:1.2;
  margin-bottom:4px;
}
.intro-tile-meta {
  font-size:12px; font-weight:500;
  opacity:0.7;
}
.intro-tile.space {
  background:linear-gradient(145deg, #1a1035 0%, #2d1854 60%, #4a1c6b 100%);
  color:#E2CBFF;
}
.intro-tile.space .intro-tile-name { color:#fff; }
.intro-tile.semi {
  background:linear-gradient(145deg, #0d2818 0%, #154d2e 60%, #1e7a47 100%);
  color:#A7F3D0;
}
.intro-tile.semi .intro-tile-name { color:#fff; }

/* Featured row */
.intro-featured {
  padding:0 24px 20px;
}
.intro-featured-label {
  font-size:12px; font-weight:600; color:var(--text3);
  text-transform:uppercase; letter-spacing:0.08em;
  margin-bottom:12px;
}
.intro-featured-scroll {
  display:flex; gap:10px; overflow-x:auto; scrollbar-width:none;
  margin:0 -24px; padding:0 24px;
}
.intro-featured-scroll::-webkit-scrollbar { display:none; }
.intro-feat-card {
  flex-shrink:0; width:120px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:14px 12px;
  text-align:center; cursor:pointer;
  transition:border-color 0.15s;
}
.intro-feat-card:active { border-color:rgba(255,255,255,0.15); }
.intro-feat-logo {
  width:40px; height:40px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:17px; margin:0 auto 8px;
}
.intro-feat-name { font-size:11px; font-weight:600; color:var(--text); line-height:1.3; }
.intro-feat-loc { font-size:10px; color:var(--text3); margin-top:2px; }

/* Bottom CTA */
.intro-bottom {
  padding:0 24px env(safe-area-inset-bottom,20px);
  padding-bottom:max(env(safe-area-inset-bottom),20px);
}
.intro-cta {
  width:100%; padding:16px; border:none;
  background:var(--accent); color:#fff;
  font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700;
  border-radius:var(--radius); cursor:pointer;
  letter-spacing:-0.01em;
  transition:opacity 0.15s;
}
.intro-cta:active { opacity:0.85; }

/* ═══ DIRECTORY VIEW ═══ */
.dir {
  position:absolute; inset:0; background:var(--bg);
  z-index:15; display:flex; flex-direction:column;
  transform:translateY(100%);
  transition:transform 0.45s cubic-bezier(0.16,1,0.3,1);
}
.dir.open { transform:translateY(0); }

.dir-top { padding:env(safe-area-inset-top,12px) 20px 0; flex-shrink:0; }
.dir-nav {
  display:flex; align-items:center; gap:12px; margin-bottom:16px;
}
.dir-back {
  width:36px; height:36px; border-radius:50%;
  background:var(--surface); border:1px solid var(--border);
  color:var(--text2); display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0;
}
.dir-back:active { background:var(--surface2); }
.dir-nav-title {
  font-family:'DM Serif Display',serif;
  font-size:22px; font-weight:400; color:var(--text);
  letter-spacing:-0.01em;
}

/* Search */
.dir-search-wrap { position:relative; margin-bottom:14px; }
.dir-search {
  width:100%; background:var(--surface); border:1px solid var(--border);
  color:var(--text); border-radius:var(--radius);
  padding:13px 16px 13px 42px;
  font-size:15px; font-family:'DM Sans',sans-serif;
  outline:none; transition:border-color 0.15s;
}
.dir-search:focus { border-color:var(--accent); }
.dir-search::placeholder { color:var(--text3); }
.dir-search-icon {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  color:var(--text3);
}

/* Pill filters */
.dir-pills {
  display:flex; gap:8px; overflow-x:auto; scrollbar-width:none;
  margin:0 -20px; padding:0 20px 14px;
}
.dir-pills::-webkit-scrollbar { display:none; }
.dir-pill {
  flex-shrink:0; padding:8px 16px;
  border-radius:100px; border:1px solid var(--border);
  background:var(--surface); color:var(--text2);
  font-size:13px; font-weight:600; cursor:pointer;
  transition:all 0.15s;
  white-space:nowrap;
}
.dir-pill.on {
  background:var(--text); color:var(--bg);
  border-color:var(--text);
}
.dir-pill:active { transform:scale(0.96); }

/* Card grid */
.dir-grid {
  flex:1; overflow-y:auto; padding:0 20px;
  scrollbar-width:none;
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px; align-content:start;
}
.dir-grid::-webkit-scrollbar { display:none; }

.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:16px 14px;
  cursor:pointer; transition:border-color 0.15s, transform 0.15s;
  display:flex; flex-direction:column;
}
.card:active { transform:scale(0.97); border-color:rgba(255,255,255,0.12); }
.card-logo {
  width:44px; height:44px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:18px; margin-bottom:12px;
  flex-shrink:0;
}
.card-name {
  font-size:14px; font-weight:700; color:var(--text);
  line-height:1.3; margin-bottom:4px;
}
.card-loc {
  font-size:11px; color:var(--text3); margin-bottom:10px;
}
.card-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:auto; }
.card-tag {
  font-size:9px; font-weight:600;
  padding:3px 7px; border-radius:6px;
  background:rgba(52,211,153,0.08); color:var(--green);
  border:1px solid rgba(52,211,153,0.12);
}
.card-tag.feat {
  background:rgba(232,123,53,0.08); color:var(--accent);
  border-color:rgba(232,123,53,0.12);
}

/* Bottom bar */
.dir-bottom {
  flex-shrink:0;
  padding:12px 20px env(safe-area-inset-bottom,12px);
  border-top:1px solid var(--border);
  display:flex; gap:8px;
}
.dir-list-btn {
  flex:1; padding:14px;
  border:none; border-radius:var(--radius);
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:700;
  cursor:pointer; letter-spacing:-0.01em;
  transition:opacity 0.15s;
}
.dir-list-btn:active { opacity:0.85; }
.dir-list-btn.primary { background:var(--accent); color:#fff; }
.dir-list-btn.secondary { background:var(--surface2); color:var(--text2); border:1px solid var(--border); }
</style>
</head>
<body>
<div class="app">

  <!-- INTRO -->
  <div class="intro" id="intro">
    <div class="intro-hero">
      <div class="intro-badge">
        <div class="intro-badge-dot"></div>
        62 companies listed
      </div>
      <div class="intro-title">Find Your<br><span>Community</span></div>
      <div class="intro-sub">Arizona's aerospace and semiconductor companies, jobs, and events in one place.</div>
    </div>

    <div class="intro-tiles">
      <div class="intro-tile space" onclick="openDir('space')">
        <div class="intro-tile-icon">&#127756;</div>
        <div class="intro-tile-name">Space Rising</div>
        <div class="intro-tile-meta">26 companies / 8 jobs</div>
      </div>
      <div class="intro-tile semi" onclick="openDir('s3c')">
        <div class="intro-tile-icon">&#9889;</div>
        <div class="intro-tile-name">S3C Arizona</div>
        <div class="intro-tile-meta">36 companies / 22 jobs</div>
      </div>
    </div>

    <div class="intro-featured">
      <div class="intro-featured-label">Featured Members</div>
      <div class="intro-featured-scroll" id="feat-scroll"></div>
    </div>

    <div class="intro-bottom">
      <button class="intro-cta" onclick="openDir('space')">Explore the Directory</button>
    </div>
  </div>

  <!-- DIRECTORY -->
  <div class="dir" id="dir">
    <div class="dir-top">
      <div class="dir-nav">
        <button class="dir-back" onclick="closeDir()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="dir-nav-title" id="dir-title">Space Rising</div>
      </div>
      <div class="dir-search-wrap">
        <div class="dir-search-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
        <input class="dir-search" type="text" placeholder="Search companies, jobs...">
      </div>
      <div class="dir-pills" id="dir-pills"></div>
    </div>

    <div class="dir-grid" id="dir-grid"></div>

    <div class="dir-bottom">
      <button class="dir-list-btn primary">List Your Company</button>
      <button class="dir-list-btn secondary">Jobs</button>
    </div>
  </div>

</div>

<script>
const DATA = {
  space: {
    name:'Space Rising',
    pills:['All','Aerospace','Defense','Launch','Satellite','R&D'],
    list:[
      {n:'Raytheon Missiles & Defense',c:'Tucson, AZ',e:'10,000+',b:['ITAR','DoD Secret'],f:1,bg:'#1E1145',fg:'#A78BFA'},
      {n:'Northrop Grumman',c:'Chandler, AZ',e:'2,000+',b:['AS9100D'],f:1,bg:'#1a0d28',fg:'#C084FC'},
      {n:'World View Enterprises',c:'Tucson, AZ',e:'200+',b:['FAA Part 145'],f:1,bg:'#0d2818',fg:'#34D399'},
      {n:'Phantom Space Corp',c:'Tucson, AZ',e:'50+',b:['ITAR'],bg:'#2D1B06',fg:'#FBBF24'},
      {n:'FreeFall Aerospace',c:'Tucson, AZ',e:'11-50',b:['ITAR'],bg:'#2D0A0A',fg:'#FB7185'},
      {n:'SAIC Arizona',c:'Tucson, AZ',e:'500+',b:['DoD','TS/SCI'],bg:'#062028',fg:'#38BDF8'},
      {n:'Kratos Defense',c:'Tucson, AZ',e:'200+',b:['ITAR'],bg:'#2D1506',fg:'#FB923C'},
      {n:'L3Harris Technologies',c:'Tempe, AZ',e:'1,000+',b:['AS9100D'],bg:'#0D1428',fg:'#60A5FA'},
    ]
  },
  s3c: {
    name:'S3C Arizona',
    pills:['All','Fabrication','Design','Testing','Equipment','Materials'],
    list:[
      {n:'Intel Chandler',c:'Chandler, AZ',e:'10,000+',b:['ITAR','ISO 9001'],f:1,bg:'#0D1428',fg:'#60A5FA'},
      {n:'TSMC Arizona',c:'Phoenix, AZ',e:'2,000+',b:['ISO 14001'],f:1,bg:'#0d2818',fg:'#34D399'},
      {n:'Microchip Technology',c:'Chandler, AZ',e:'5,000+',b:['AS9100D'],f:1,bg:'#1E1145',fg:'#A78BFA'},
      {n:'Honeywell Aerospace',c:'Phoenix, AZ',e:'10,000+',b:['AS9100D','ITAR'],f:1,bg:'#2D0A0A',fg:'#FB7185'},
      {n:'onsemi',c:'Scottsdale, AZ',e:'5,000+',b:['ISO 9001'],bg:'#0D1428',fg:'#60A5FA'},
      {n:'Amkor Technology',c:'Tempe, AZ',e:'2,000+',b:['ISO 9001'],bg:'#2D1B06',fg:'#FBBF24'},
      {n:'NXP Semiconductors',c:'Chandler, AZ',e:'1,000+',b:['AEC-Q100'],bg:'#2D0A0A',fg:'#FB7185'},
      {n:'Benchmark Electronics',c:'Tempe, AZ',e:'500+',b:['ITAR'],bg:'#062028',fg:'#38BDF8'},
      {n:'Rogers Corporation',c:'Chandler, AZ',e:'200+',b:['ISO 14001'],bg:'#0d2818',fg:'#34D399'},
      {n:'Qorvo',c:'Chandler, AZ',e:'500+',b:['ITAR'],bg:'#2D1506',fg:'#FB923C'},
      {n:'Applied Materials',c:'Tucson, AZ',e:'1,000+',b:[],bg:'#1E1145',fg:'#A78BFA'},
      {n:'Analog Devices',c:'Chandler, AZ',e:'500+',b:['ISO 9001'],bg:'#0d2818',fg:'#34D399'},
    ]
  }
};

// Populate featured scroll from both directories
const allFeatured = [...DATA.space.list,...DATA.s3c.list].filter(c=>c.f);
document.getElementById('feat-scroll').innerHTML = allFeatured.map(c=>`
  <div class="intro-feat-card">
    <div class="intro-feat-logo" style="background:${c.bg};color:${c.fg}">${c.n[0]}</div>
    <div class="intro-feat-name">${c.n}</div>
    <div class="intro-feat-loc">${c.c}</div>
  </div>
`).join('');

function openDir(key) {
  const d = DATA[key];
  document.getElementById('dir-title').textContent = d.name;
  document.getElementById('dir-pills').innerHTML = d.pills.map((p,i)=>`
    <button class="dir-pill${i===0?' on':''}" onclick="this.parentElement.querySelectorAll('.dir-pill').forEach(b=>b.classList.remove('on'));this.classList.add('on')">${p}</button>
  `).join('');
  document.getElementById('dir-grid').innerHTML = d.list.map(c=>`
    <div class="card">
      <div class="card-logo" style="background:${c.bg};color:${c.fg}">${c.n[0]}</div>
      <div class="card-name">${c.n}</div>
      <div class="card-loc">${c.c}</div>
      <div class="card-tags">
        ${c.f?'<span class="card-tag feat">FEATURED</span>':''}
        ${c.b.map(b=>`<span class="card-tag">${b}</span>`).join('')}
      </div>
    </div>
  `).join('');
  document.getElementById('intro').classList.add('out');
  document.getElementById('dir').classList.add('open');
}

function closeDir() {
  document.getElementById('dir').classList.remove('open');
  document.getElementById('intro').classList.remove('out');
}
</script>
</body>
</html>
