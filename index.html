<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Space Rising | A New Way to Space</title>

    <!-- Link previews (Slack / iMessage / X). Crawlers don't run JS, so these
         static tags are the home/baseline card. Per-page React titles refine the
         browser tab + JS-aware crawlers; the Space OS app pages override these to
         "<feature> | Space OS". Home leads with the Space Rising brand. -->
    <meta name="description" content="Space Rising is the platform of record for the space economy — companies, capital, events, and intelligence in one place." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Space Rising" />
    <meta property="og:title" content="Space Rising | A New Way to Space" />
    <meta property="og:description" content="The platform of record for the space economy — companies, capital, events, and intelligence in one place." />
    <meta property="og:url" content="https://www.spacerising.org/" />
    <meta property="og:image" content="https://www.spacerising.org/v2-assets/blueprint-hero.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Space Rising | A New Way to Space" />
    <meta name="twitter:description" content="The platform of record for the space economy — companies, capital, events, and intelligence in one place." />
    <meta name="twitter:image" content="https://www.spacerising.org/v2-assets/blueprint-hero.png" />

    <script>
      // Per-domain default title. Home leads with the Space Rising brand; the
      // Space OS app pages set their own "<feature> | Space OS" titles in React.
      (function () {
        try {
          var h = (location.hostname || '').toLowerCase();
          if (h.indexOf('spacerising') !== -1) {
            document.title = 'Space Rising | A New Way to Space';
          }
        } catch (e) {}
      })();
    </script>
    <script>
      // Password-reset safety net.
      // Supabase only redirects a reset link to its approved URL list; if the
      // Space Rising login URL isn't approved it silently drops the reset token
      // onto the site's default home page — a page with no "set new password"
      // form, so the user just sees the homepage. Runs before the app bundle:
      // if a recovery token is present and we're not already on the login page,
      // carry the token (in the URL fragment/query) to the V2 login screen,
      // where the existing PASSWORD_RECOVERY handler shows the reset form.
      (function () {
        try {
          var frag = (location.hash || '') + (location.search || '');
          var isRecovery = frag.indexOf('type=recovery') !== -1;
          var onLogin = location.pathname.indexOf('/login') !== -1;
          if (isRecovery && !onLogin) {
            location.replace('/space-rising-v2/login' + location.search + location.hash);
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <style>
      :root {
        --bg: #06060A; --s1: #0E0E14; --s2: #15151E; --s3: #1C1C28;
        --bd: rgba(255,255,255,0.06); --bd2: rgba(255,255,255,0.1);
        --tx: #F0F0F5; --tx2: rgba(240,240,245,0.55); --tx3: rgba(240,240,245,0.25);
        --cyan: #22D3EE; --cyan-dim: rgba(34,211,238,0.08); --cyan-brd: rgba(34,211,238,0.2);
        --violet: #A78BFA; --violet-dim: rgba(167,139,250,0.08); --violet-brd: rgba(167,139,250,0.2);
        --emerald: #34D399; --amber: #FBBF24; --rose: #FB7185;
        --r: 16px; --r-sm: 10px; --nav-h: 72px;
      }
      *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--tx); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100dvh; padding-bottom: var(--nav-h); }
      /* v10 scrollable regions */
      .v10-scroll { overflow-y: auto; overscroll-behavior: contain; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
      .v10-scroll::-webkit-scrollbar { display: none; }
      /* v10 chips row */
      .v10-chips { display: flex; gap: 8px; padding: 12px 20px; overflow-x: auto; scrollbar-width: none; }
      .v10-chips::-webkit-scrollbar { display: none; }
      /* v10 skeleton shimmer */
      @keyframes v10-shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
      .v10-skel { background: linear-gradient(90deg, var(--s2) 25%, var(--s3) 50%, var(--s2) 75%); background-size: 200% 100%; animation: v10-shimmer 1.5s infinite; border-radius: 4px; }
      @keyframes v10-spin { to { transform: rotate(360deg); } }
      /* v10 page enter animation */
      @keyframes v10-fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .v10-page { animation: v10-fadeUp 0.25s cubic-bezier(0.16,1,0.3,1); }
      /* Desktop: full width, content handles its own max-width */
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
